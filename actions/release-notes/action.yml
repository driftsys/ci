name: "driftsys release-notes"
description: "Publish a GitHub release with auto-generated notes from a tag."
author: "driftsys"

inputs:
  tag:
    description: "Tag to publish a release for. Defaults to github.ref_name (only valid on tag push events)."
    required: false
    default: ""
  latest:
    description: "Mark this release as latest. 'true', 'false', or 'auto' (let GitHub decide). Default: auto."
    required: false
    default: "auto"
  draft:
    description: "Create the release as a draft."
    required: false
    default: "false"
  prerelease:
    description: "Mark the release as a prerelease."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Resolve tag
      id: tag
      shell: bash
      env:
        INPUT_TAG: ${{ inputs.tag }}
        REF_NAME: ${{ github.ref_name }}
        REF_TYPE: ${{ github.ref_type }}
      run: |
        set -euo pipefail
        if [ -n "$INPUT_TAG" ]; then
          tag="$INPUT_TAG"
        elif [ "$REF_TYPE" = "tag" ]; then
          tag="$REF_NAME"
        else
          echo "::error::No 'tag' input given and current ref ($REF_NAME) is not a tag"
          exit 1
        fi
        echo "value=$tag" >> "$GITHUB_OUTPUT"

    - name: Publish release notes
      shell: bash
      env:
        TAG: ${{ steps.tag.outputs.value }}
        LATEST: ${{ inputs.latest }}
        DRAFT: ${{ inputs.draft }}
        PRERELEASE: ${{ inputs.prerelease }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        if gh release view "$TAG" > /dev/null 2>&1; then
          echo "::notice::Release $TAG already exists; skipping"
          exit 0
        fi
        flags=(--generate-notes --title "$TAG")
        case "$LATEST" in
          true) flags+=(--latest=true) ;;
          false) flags+=(--latest=false) ;;
          auto) ;;
          *) echo "::error::invalid 'latest' input: $LATEST (expected true/false/auto)" >&2; exit 1 ;;
        esac
        [ "$DRAFT" = "true" ] && flags+=(--draft)
        [ "$PRERELEASE" = "true" ] && flags+=(--prerelease)
        gh release create "$TAG" "${flags[@]}"

branding:
  icon: "package"
  color: "blue"
