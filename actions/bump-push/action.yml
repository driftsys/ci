name: "driftsys bump + push"
description: "Bump semver via git-std, commit + tag, then push."
author: "driftsys"

inputs:
  remote:
    description: "Remote to push to."
    required: false
    default: "origin"
  dry-run:
    description: "If 'true', run bump + tag but skip push."
    required: false
    default: "false"
  git-std-version:
    description: "git-std version to install."
    required: false
    default: "0.11.12"

runs:
  using: "composite"
  steps:
    - name: Install git-std
      shell: bash
      env:
        GIT_STD_VERSION: ${{ inputs.git-std-version }}
      run: |
        curl --proto '=https' --tlsv1.2 -fsSL \
          "https://github.com/driftsys/git-std/releases/download/v${GIT_STD_VERSION}/install.sh" \
          | GIT_STD_INSTALL_DIR=/usr/local/bin sh

    - name: Run bump-push
      shell: bash
      env:
        REMOTE: ${{ inputs.remote }}
        DRY_RUN: ${{ inputs.dry-run == 'true' && '1' || '0' }}
      run: bash "${{ github.action_path }}/../../scripts/bump-push.sh"

branding:
  icon: "tag"
  color: "blue"
