name: "driftsys release"
description: "Bump semver via git-std, commit + tag, then push."
author: "driftsys"

inputs:
  remote:
    description: "Remote to push to."
    required: false
    default: "origin"
  dry-run:
    description: "If 'true', run bump + tag but skip push."
    required: false
    default: "false"
  git-std-version:
    description: "Minimum git-std version to ensure is installed."
    required: false
    default: "0.9.0"

outputs:
  tag:
    description: "The newly created tag (e.g. v0.2.0). Empty if no bump happened."
    value: ${{ steps.run.outputs.tag }}

runs:
  using: "composite"
  steps:
    - name: Install git-std
      shell: bash
      env:
        GIT_STD_MIN_VERSION: ${{ inputs.git-std-version }}
      run: |
        curl --proto '=https' --tlsv1.2 -fsSL \
          https://raw.githubusercontent.com/driftsys/git-std/main/install.sh \
          | GIT_STD_INSTALL_DIR=/usr/local/bin bash

    - name: Run release
      id: run
      shell: bash
      env:
        REMOTE: ${{ inputs.remote }}
        DRY_RUN: ${{ inputs.dry-run == 'true' && '1' || '0' }}
      run: |
        set -euo pipefail
        # git-std prompts on a non-release branch and aborts in non-TTY (CI).
        # This action is automation, so bypass that guard.
        export GIT_STD_YES=1
        git std bump
        tag=$(git describe --tags --abbrev=0)
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        if [ "$DRY_RUN" = "1" ]; then
          echo "::notice::DRY_RUN=1 — skipping push (would push tag $tag)"
          exit 0
        fi
        git push "$REMOTE" HEAD --follow-tags

branding:
  icon: "tag"
  color: "blue"
