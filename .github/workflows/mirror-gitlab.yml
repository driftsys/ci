name: mirror-gitlab

# Push-mirror this repo to gitlab.com/driftsys/ci at every release.
# Triggered only on tag push — that's when the GL side actually cares:
# a tag is what the GL CI Catalog keys publication off, and
# `git push --mirror` brings main, v<MAJOR>, and every other ref along
# for the ride in the same shot.
#
# Setup (one-time):
#   1. On gitlab.com → driftsys/ci → Settings → Access Tokens, create a
#      project access token with role "Maintainer" and scope
#      `write_repository`.
#   2. Copy the token into this repo's Settings → Secrets and variables
#      → Actions → New repository secret, name `GITLAB_TOKEN`.
#   3. (Optional) Run this workflow manually once via the Actions tab to
#      perform the initial mirror, before the next tag lands.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    name: push to gitlab
    runs-on: ubuntu-latest
    steps:
      - name: Mirror to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_URL: https://gitlab.com/driftsys/ci.git
        run: |
          set -euo pipefail
          if [ -z "${GITLAB_TOKEN:-}" ]; then
            echo "::error::GITLAB_TOKEN secret is not set; see workflow header for setup"
            exit 1
          fi
          # `git clone --mirror` followed by `git push --mirror` is the
          # canonical way to keep two remotes byte-identical (refs included).
          git clone --mirror "https://github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git push --mirror "https://oauth2:${GITLAB_TOKEN}@${GITLAB_URL#https://}"
