name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      # Commit linting is handled by the standard-release reusable workflow
      # in release.yml — no need to duplicate it here.

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Install dprint
        run: |
          curl -fsSL https://dprint.dev/install.sh | sh
          echo "${HOME}/.dprint/bin" >> "${GITHUB_PATH}"

      - name: Install shfmt
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_${ARCH}" \
            -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) \
            latest /usr/local/bin

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: dprint check
        run: dprint check

      - name: markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#_site" "#docs/superpowers"

      - name: shellcheck
        run: shellcheck scripts/*.sh bootstrap

      - name: shfmt
        run: shfmt -d -i 2 -ci -sr scripts/ bootstrap

      - name: actionlint
        run: actionlint

      - name: schema-check
        run: bash scripts/schema-check.sh

      - name: gitlab-shell-check
        run: bash scripts/lint-gitlab-shell.sh

      - name: mdbook build
        run: mdbook build
