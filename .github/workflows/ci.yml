name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: just verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      # On a pull_request, github.head_ref checks out the PR branch and `main`
      # only exists as origin/main. Fetch it into a local ref so
      # `git std lint --range main..HEAD` works. Skip on push-to-main: HEAD
      # *is* main, so the fetch refspec would refuse to update the current
      # branch and the range would be empty anyway.
      - name: Ensure local main branch ref
        if: github.event_name == 'pull_request'
        run: git fetch origin main:refs/heads/main

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Install dprint
        run: |
          curl -fsSL https://dprint.dev/install.sh | sh
          echo "${HOME}/.dprint/bin" >> "${GITHUB_PATH}"

      - name: Install shfmt
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_${ARCH}" \
            -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) \
            latest /usr/local/bin

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Install git-std
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL \
            https://raw.githubusercontent.com/driftsys/git-std/main/install.sh \
            | GIT_STD_INSTALL_DIR=/usr/local/bin bash

      - name: Configure git identity
        run: |
          git config user.email ci@driftsys.invalid
          git config user.name "driftsys CI"

      # On PR: full verify (commit lint + build).
      - name: Run verify
        if: github.event_name == 'pull_request'
        run: just verify

      # On push to main: build only. Commits were already validated by their
      # PR's `just verify`; `git std lint --range main..HEAD` would be an
      # empty range here.
      - name: Run build
        if: github.event_name == 'push'
        run: just build
