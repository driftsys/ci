spec:
  inputs:
    image:
      description: "Container image for the job."
      default: "ghcr.io/driftsys/dock:core-v0.2.0"
    stage:
      description: "Pipeline stage."
      default: "deploy"
    remote:
      description: "Remote to push to."
      default: "origin"
    dry-run:
      description: "Skip push if true."
      default: "false"
      type: boolean
---

release:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  variables:
    GIT_DEPTH: "0"
    DRY_RUN: "$[[ inputs.dry-run ]]"
    REMOTE: "$[[ inputs.remote ]]"
  before_script:
    - dock-bootstrap
    - . /etc/dock/ca.env 2>/dev/null || true
  script:
    - export GIT_STD_YES=1
    - git std bump
    - |
      if [ "$DRY_RUN" = "true" ]; then
        echo "DRY_RUN=true — skipping push"
        exit 0
      fi
      git push "$REMOTE" HEAD --follow-tags
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
