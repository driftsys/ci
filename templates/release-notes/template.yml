spec:
  inputs:
    image:
      description: "Container image with release-cli and git available."
      default: "registry.gitlab.com/gitlab-org/release-cli:latest"
    stage:
      description: "Pipeline stage for the release-notes job."
      default: "release"
---

release-notes:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  variables:
    GIT_DEPTH: "0"
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      PREV=$(git describe --abbrev=0 --tags "${CI_COMMIT_TAG}^" 2> /dev/null || true)
      if [ -n "$PREV" ]; then
        git log --pretty=format:'- %s' "${PREV}..${CI_COMMIT_TAG}" > /tmp/notes.md
      else
        git log --pretty=format:'- %s' "${CI_COMMIT_TAG}" > /tmp/notes.md
      fi
  release:
    tag_name: $CI_COMMIT_TAG
    name: $CI_COMMIT_TAG
    description: /tmp/notes.md
